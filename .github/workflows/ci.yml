name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: duraclaw
          POSTGRES_PASSWORD: duraclaw
          POSTGRES_DB: duraclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U duraclaw -d duraclaw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://duraclaw:duraclaw@localhost:5432/duraclaw_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
      - run: go test ./...
      - run: go vet ./...
